<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>验证码识别测试页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 100vh; }
h1 { font-size: 24px; color: #333; margin-bottom: 8px; }
.subtitle { color: #999; font-size: 14px; margin-bottom: 30px; }
.scenario-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; width: 100%; max-width: 900px; margin-bottom: 30px; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; transition: all .2s; border: 2px solid transparent; }
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-2px); }
.card.active { border-color: #6841ea; }
.card-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 6px; }
.card-desc { font-size: 13px; color: #999; }
.card-dom { font-size: 11px; color: #6841ea; font-family: monospace; margin-top: 8px; background: #f0edff; padding: 4px 8px; border-radius: 4px; }

/* 模拟遮罩层 */
.captcha-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
.captcha-overlay.show { display: flex; }

/* ============ 小红书风格验证码 (#captcha-div) ============ */
#captcha-div { background: #fff; border-radius: 12px; padding: 24px; width: 340px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
#captcha-div .tc-3 { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 8px; }
#captcha-div .lh-20.size-14 { font-size: 14px; color: #666; line-height: 20px; margin-bottom: 16px; }
#captcha-div .img-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
#captcha-div .img-container { border-radius: 8px; overflow: hidden; cursor: pointer; aspect-ratio: 1; border: 2px solid transparent; transition: border-color .15s; position: relative; }
#captcha-div .img-container:hover { border-color: #6841ea; }
#captcha-div .img-container.selected { border-color: #6841ea; }
#captcha-div .img-container.selected::after { content: '✓'; position: absolute; top: 4px; right: 4px; background: #6841ea; color: #fff; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
#captcha-div .img-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
#captcha-div .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
#captcha-div .btn-primary { background: #6841ea; color: #fff; }
#captcha-div .btn-primary:hover { background: #522bd6; }
#captcha-div .btn-disabled { background: #e0e0e0; color: #999; cursor: not-allowed; }

/* ============ fe-captcha-app 风格 ============ */
.fe-captcha-app { background: #fff; border-radius: 12px; padding: 24px; width: 340px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.fe-captcha-app .font-600.tc-3 { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 8px; }
.fe-captcha-app .lh-20.size-14 { font-size: 14px; color: #666; line-height: 20px; margin-bottom: 16px; }
.fe-captcha-app .img-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 16px; }
.fe-captcha-app .img-container { border-radius: 6px; overflow: hidden; cursor: pointer; aspect-ratio: 1; border: 2px solid transparent; transition: border-color .15s; position: relative; }
.fe-captcha-app .img-container:hover { border-color: #ff2442; }
.fe-captcha-app .img-container.selected { border-color: #ff2442; }
.fe-captcha-app .img-container.selected::after { content: '✓'; position: absolute; top: 2px; right: 2px; background: #ff2442; color: #fff; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.fe-captcha-app .img-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
.fe-captcha-app .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; background: #ff2442; color: #fff; }
.fe-captcha-app .btn:hover { background: #e0203c; }

/* 成功提示 */
.success-banner { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #00aa5b; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: 600; z-index: 2000; animation: slideDown .3s ease-out; }
.success-banner.show { display: block; }
@keyframes slideDown { 0% { opacity: 0; transform: translateX(-50%) translateY(-20px); } 100% { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* 日志面板 */
.log-panel { width: 100%; max-width: 900px; background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-top: 20px; }
.log-panel h3 { font-size: 14px; color: #333; margin-bottom: 10px; }
.log-entries { max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; }
.log-entry { padding: 4px 8px; border-bottom: 1px solid #f0f0f0; }
.log-entry.log-info { color: #3bbfff; }
.log-entry.log-success { color: #00aa5b; }
.log-entry.log-error { color: #ea3639; }
</style>
</head>
<body>

<h1>AI Browser 验证码识别测试</h1>
<p class="subtitle">模拟小红书等网站的点选验证码，用于测试 CaptchaService 的检测、截图、AI识别、模拟点击流程</p>

<div class="scenario-cards">
  <div class="card active" data-scenario="xhs-3x3" onclick="selectScenario(this)">
    <div class="card-title">小红书 3x3 验证码</div>
    <div class="card-desc">9宫格图片点选，选择2张目标图片</div>
    <div class="card-dom">容器: #captcha-div | 选择器: .tc-3, .img-container, .btn</div>
  </div>
  <div class="card" data-scenario="xhs-4x4" onclick="selectScenario(this)">
    <div class="card-title">小红书 4x4 验证码</div>
    <div class="card-desc">16宫格图片点选，选择3张目标图片</div>
    <div class="card-dom">容器: .fe-captcha-app | 选择器: .font-600.tc-3, .img-container, .btn</div>
  </div>
</div>

<button onclick="showCaptcha()" style="background:#6841ea;color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s">弹出验证码</button>

<!-- 成功提示 -->
<div class="success-banner" id="successBanner">验证通过！</div>

<!-- 验证码遮罩层 -->
<div class="captcha-overlay" id="captchaOverlay">
  <!-- 小红书 3x3 验证码 -->
  <div id="captcha-div" style="display:none">
    <div class="tc-3" id="captchaPrompt3x3"></div>
    <div class="lh-20 size-14" id="captchaDesc3x3"></div>
    <div class="img-grid" id="captchaGrid3x3"></div>
    <button class="btn btn-primary" id="verifyBtn3x3">验证</button>
  </div>
  <!-- fe-captcha-app 4x4 验证码 -->
  <div class="fe-captcha-app" id="captcha4x4" style="display:none">
    <div class="font-600 tc-3" id="captchaPrompt4x4"></div>
    <div class="lh-20 size-14" id="captchaDesc4x4"></div>
    <div class="img-grid" id="captchaGrid4x4"></div>
    <button class="btn" id="verifyBtn4x4">验证</button>
  </div>
</div>

<!-- 日志面板 -->
<div class="log-panel">
  <h3>测试日志</h3>
  <div class="log-entries" id="logEntries">
    <div class="log-entry log-info">等待弹出验证码...</div>
  </div>
</div>

<script>
let currentScenario = 'xhs-3x3'
let selectedIndices = []
let correctIndices = []

function log(level, msg) {
  const el = document.getElementById('logEntries')
  const entry = document.createElement('div')
  entry.className = 'log-entry log-' + level
  const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
  entry.textContent = `[${time}] ${msg}`
  el.appendChild(entry)
  el.scrollTop = el.scrollHeight
}

function selectScenario(card) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'))
  card.classList.add('active')
  currentScenario = card.dataset.scenario
  log('info', '切换场景: ' + currentScenario)
}

// ============ Canvas 绘图：用明确图案代替随机图片 ============

// 图案绘制函数：每个函数在 canvas 上画一个可识别的物体
const DRAW = {
  // ---- 正确答案图案 ----
  bicycle(ctx, w, h) {
    const cx = w/2, cy = h/2, r = w*0.18
    ctx.strokeStyle = '#333'; ctx.lineWidth = 3
    // 后轮
    ctx.beginPath(); ctx.arc(cx - r*1.2, cy + r*0.5, r, 0, Math.PI*2); ctx.stroke()
    // 前轮
    ctx.beginPath(); ctx.arc(cx + r*1.2, cy + r*0.5, r, 0, Math.PI*2); ctx.stroke()
    // 车架
    ctx.beginPath(); ctx.moveTo(cx - r*1.2, cy + r*0.5); ctx.lineTo(cx, cy - r*0.8); ctx.lineTo(cx + r*1.2, cy + r*0.5); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(cx, cy - r*0.8); ctx.lineTo(cx - r*0.3, cy + r*0.5); ctx.stroke()
    // 把手
    ctx.beginPath(); ctx.moveTo(cx, cy - r*0.8); ctx.lineTo(cx + r*0.5, cy - r*1.1); ctx.stroke()
    // 座椅
    ctx.beginPath(); ctx.moveTo(cx - r*0.5, cy - r*0.85); ctx.lineTo(cx + r*0.3, cy - r*0.85); ctx.stroke()
    // 标注
    ctx.fillStyle = '#6841ea'; ctx.font = `bold ${w*0.1}px sans-serif`; ctx.textAlign = 'center'
    ctx.fillText('自行车', cx, h*0.15)
  },

  trafficLight(ctx, w, h) {
    const cx = w/2, bw = w*0.22, bh = h*0.5
    // 灯柱
    ctx.fillStyle = '#666'; ctx.fillRect(cx - bw*0.15, cy = h*0.5 + bh*0.3, bw*0.3, h*0.25)
    // 灯箱
    ctx.fillStyle = '#333'; ctx.fillRect(cx - bw/2, h*0.18, bw, bh)
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2; ctx.strokeRect(cx - bw/2, h*0.18, bw, bh)
    // 红灯
    ctx.fillStyle = '#ff3333'; ctx.beginPath(); ctx.arc(cx, h*0.26, bw*0.28, 0, Math.PI*2); ctx.fill()
    // 黄灯
    ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(cx, h*0.40, bw*0.28, 0, Math.PI*2); ctx.fill()
    // 绿灯
    ctx.fillStyle = '#33cc33'; ctx.beginPath(); ctx.arc(cx, h*0.54, bw*0.28, 0, Math.PI*2); ctx.fill()
    // 标注
    ctx.fillStyle = '#6841ea'; ctx.font = `bold ${w*0.1}px sans-serif`; ctx.textAlign = 'center'
    ctx.fillText('红绿灯', cx, h*0.9)
  },

  bridge(ctx, w, h) {
    ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 4
    // 桥面
    ctx.fillStyle = '#D2B48C'; ctx.fillRect(w*0.1, h*0.45, w*0.8, h*0.1)
    // 桥拱
    ctx.beginPath(); ctx.arc(w*0.35, h*0.55, w*0.18, Math.PI, 0); ctx.stroke()
    ctx.beginPath(); ctx.arc(w*0.65, h*0.55, w*0.18, Math.PI, 0); ctx.stroke()
    // 水面
    ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, h*0.65, w, h*0.35)
    // 水波
    ctx.strokeStyle = '#4682B4'; ctx.lineWidth = 1.5
    for (let i = 0; i < 4; i++) {
      ctx.beginPath()
      ctx.moveTo(0, h*0.7 + i*h*0.06)
      ctx.bezierCurveTo(w*0.25, h*0.68 + i*h*0.06, w*0.75, h*0.72 + i*h*0.06, w, h*0.7 + i*h*0.06)
      ctx.stroke()
    }
    // 标注
    ctx.fillStyle = '#6841ea'; ctx.font = `bold ${w*0.1}px sans-serif`; ctx.textAlign = 'center'
    ctx.fillText('桥', w/2, h*0.15)
  },

  mountain(ctx, w, h) {
    // 天空
    const sky = ctx.createLinearGradient(0, 0, 0, h*0.6)
    sky.addColorStop(0, '#87CEEB'); sky.addColorStop(1, '#E0F0FF')
    ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h*0.6)
    // 山
    ctx.fillStyle = '#5D4E37'
    ctx.beginPath(); ctx.moveTo(w*0.1, h*0.6); ctx.lineTo(w*0.35, h*0.2); ctx.lineTo(w*0.6, h*0.6); ctx.fill()
    ctx.fillStyle = '#6B5B45'
    ctx.beginPath(); ctx.moveTo(w*0.4, h*0.6); ctx.lineTo(w*0.65, h*0.15); ctx.lineTo(w*0.9, h*0.6); ctx.fill()
    // 雪顶
    ctx.fillStyle = '#FFF'
    ctx.beginPath(); ctx.moveTo(w*0.28, h*0.28); ctx.lineTo(w*0.35, h*0.2); ctx.lineTo(w*0.42, h*0.28); ctx.fill()
    ctx.beginPath(); ctx.moveTo(w*0.58, h*0.23); ctx.lineTo(w*0.65, h*0.15); ctx.lineTo(w*0.72, h*0.23); ctx.fill()
    // 草地
    ctx.fillStyle = '#7CCD7C'; ctx.fillRect(0, h*0.6, w, h*0.4)
    // 标注
    ctx.fillStyle = '#6841ea'; ctx.font = `bold ${w*0.1}px sans-serif`; ctx.textAlign = 'center'
    ctx.fillText('山', w/2, h*0.9)
  },

  river(ctx, w, h) {
    // 岸
    ctx.fillStyle = '#8FBC8F'; ctx.fillRect(0, 0, w*0.25, h)
    ctx.fillRect(w*0.75, 0, w*0.25, h)
    // 河水
    const water = ctx.createLinearGradient(0, 0, 0, h)
    water.addColorStop(0, '#4682B4'); water.addColorStop(1, '#1E90FF')
    ctx.fillStyle = water; ctx.fillRect(w*0.25, 0, w*0.5, h)
    // 水波
    ctx.strokeStyle = '#87CEFA'; ctx.lineWidth = 2
    for (let i = 0; i < 6; i++) {
      ctx.beginPath()
      ctx.moveTo(w*0.25, h*0.1 + i*h*0.15)
      ctx.bezierCurveTo(w*0.4, h*0.07 + i*h*0.15, w*0.6, h*0.13 + i*h*0.15, w*0.75, h*0.1 + i*h*0.15)
      ctx.stroke()
    }
    // 标注
    ctx.fillStyle = '#6841ea'; ctx.font = `bold ${w*0.1}px sans-serif`; ctx.textAlign = 'center'
    ctx.fillText('河', w/2, h*0.9)
  },

  bus(ctx, w, h) {
    const bx = w*0.15, by = h*0.2, bw = w*0.7, bh = h*0.45
    // 车身
    ctx.fillStyle = '#FF8C00'; ctx.fillRect(bx, by, bw, bh)
    ctx.strokeStyle = '#CC7000'; ctx.lineWidth = 2; ctx.strokeRect(bx, by, bw, bh)
    // 窗户
    ctx.fillStyle = '#87CEEB'
    const winW = bw*0.18, winH = bh*0.4, winY = by + bh*0.15
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(bx + bw*0.06 + i*(winW + bw*0.06), winY, winW, winH)
    }
    // 轮子
    ctx.fillStyle = '#333'
    ctx.beginPath(); ctx.arc(bx + bw*0.25, by + bh + h*0.04, h*0.06, 0, Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(bx + bw*0.75, by + bh + h*0.04, h*0.06, 0, Math.PI*2); ctx.fill()
    // 标注
    ctx.fillStyle = '#6841ea'; ctx.font = `bold ${w*0.1}px sans-serif`; ctx.textAlign = 'center'
    ctx.fillText('大巴', w/2, h*0.9)
  },

  zebraCrossing(ctx, w, h) {
    // 路面
    ctx.fillStyle = '#666'; ctx.fillRect(0, 0, w, h)
    // 斑马线
    ctx.fillStyle = '#FFF'
    const stripeH = h * 0.08, gap = h * 0.06, startY = h * 0.1
    for (let i = 0; i < 7; i++) {
      ctx.fillRect(w*0.15, startY + i*(stripeH + gap), w*0.7, stripeH)
    }
    // 行人
    ctx.fillStyle = '#FF6347'; ctx.strokeStyle = '#FF6347'; ctx.lineWidth = 3
    const px = w*0.5, py = h*0.5
    ctx.beginPath(); ctx.arc(px, py - h*0.12, h*0.04, 0, Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.moveTo(px, py - h*0.08); ctx.lineTo(px, py + h*0.05); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(px - w*0.06, py - h*0.02); ctx.lineTo(px + w*0.06, py - h*0.02); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(px, py + h*0.05); ctx.lineTo(px - w*0.04, py + h*0.14); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(px, py + h*0.05); ctx.lineTo(px + w*0.04, py + h*0.14); ctx.stroke()
    // 标注
    ctx.fillStyle = '#6841ea'; ctx.font = `bold ${w*0.08}px sans-serif`; ctx.textAlign = 'center'
    ctx.fillText('斑马线', w/2, h*0.95)
  },

  // ---- 干扰图案（不是答案） ----
  cat(ctx, w, h) {
    ctx.fillStyle = '#FFB6C1'
    ctx.beginPath(); ctx.arc(w/2, h*0.45, w*0.25, 0, Math.PI*2); ctx.fill()
    // 耳朵
    ctx.beginPath(); ctx.moveTo(w*0.3, h*0.25); ctx.lineTo(w*0.38, h*0.12); ctx.lineTo(w*0.46, h*0.25); ctx.fill()
    ctx.beginPath(); ctx.moveTo(w*0.54, h*0.25); ctx.lineTo(w*0.62, h*0.12); ctx.lineTo(w*0.7, h*0.25); ctx.fill()
    // 眼睛
    ctx.fillStyle = '#333'
    ctx.beginPath(); ctx.arc(w*0.42, h*0.4, w*0.03, 0, Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(w*0.58, h*0.4, w*0.03, 0, Math.PI*2); ctx.fill()
    // 鼻子
    ctx.fillStyle = '#FF69B4'
    ctx.beginPath(); ctx.arc(w*0.5, h*0.47, w*0.02, 0, Math.PI*2); ctx.fill()
    // 胡须
    ctx.strokeStyle = '#999'; ctx.lineWidth = 1
    ctx.beginPath(); ctx.moveTo(w*0.3, h*0.47); ctx.lineTo(w*0.42, h*0.48); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(w*0.58, h*0.48); ctx.lineTo(w*0.7, h*0.47); ctx.stroke()
  },

  house(ctx, w, h) {
    // 墙壁
    ctx.fillStyle = '#F5DEB3'; ctx.fillRect(w*0.2, h*0.4, w*0.6, h*0.45)
    // 屋顶
    ctx.fillStyle = '#CD5C5C'
    ctx.beginPath(); ctx.moveTo(w*0.1, h*0.4); ctx.lineTo(w*0.5, h*0.1); ctx.lineTo(w*0.9, h*0.4); ctx.fill()
    // 门
    ctx.fillStyle = '#8B4513'; ctx.fillRect(w*0.4, h*0.6, w*0.2, h*0.25)
    // 窗户
    ctx.fillStyle = '#87CEEB'; ctx.fillRect(w*0.25, h*0.5, w*0.12, w*0.12); ctx.fillRect(w*0.63, h*0.5, w*0.12, w*0.12)
  },

  tree(ctx, w, h) {
    // 树干
    ctx.fillStyle = '#8B4513'; ctx.fillRect(w*0.42, h*0.5, w*0.16, h*0.35)
    // 树冠
    ctx.fillStyle = '#228B22'
    ctx.beginPath(); ctx.arc(w*0.5, h*0.35, w*0.28, 0, Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(w*0.3, h*0.45, w*0.15, 0, Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(w*0.7, h*0.45, w*0.15, 0, Math.PI*2); ctx.fill()
  },

  car(ctx, w, h) {
    // 车身
    ctx.fillStyle = '#4169E1'
    ctx.beginPath(); ctx.moveTo(w*0.1, h*0.55); ctx.lineTo(w*0.25, h*0.55); ctx.lineTo(w*0.3, h*0.35); ctx.lineTo(w*0.7, h*0.35); ctx.lineTo(w*0.75, h*0.55); ctx.lineTo(w*0.9, h*0.55); ctx.lineTo(w*0.9, h*0.65); ctx.lineTo(w*0.1, h*0.65); ctx.closePath(); ctx.fill()
    // 窗户
    ctx.fillStyle = '#87CEEB'
    ctx.beginPath(); ctx.moveTo(w*0.33, h*0.37); ctx.lineTo(w*0.5, h*0.37); ctx.lineTo(w*0.5, h*0.53); ctx.lineTo(w*0.3, h*0.53); ctx.closePath(); ctx.fill()
    ctx.beginPath(); ctx.moveTo(w*0.52, h*0.37); ctx.lineTo(w*0.67, h*0.37); ctx.lineTo(w*0.7, h*0.53); ctx.lineTo(w*0.52, h*0.53); ctx.closePath(); ctx.fill()
    // 轮子
    ctx.fillStyle = '#333'
    ctx.beginPath(); ctx.arc(w*0.3, h*0.65, h*0.06, 0, Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(w*0.7, h*0.65, h*0.06, 0, Math.PI*2); ctx.fill()
  },

  flower(ctx, w, h) {
    const cx = w/2, cy = h*0.4
    // 花瓣
    const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF6B6B','#FFD93D']
    for (let i = 0; i < 6; i++) {
      ctx.fillStyle = colors[i]
      const a = (i/6)*Math.PI*2 - Math.PI/2
      ctx.beginPath(); ctx.arc(cx + Math.cos(a)*w*0.12, cy + Math.sin(a)*w*0.12, w*0.08, 0, Math.PI*2); ctx.fill()
    }
    // 花心
    ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(cx, cy, w*0.06, 0, Math.PI*2); ctx.fill()
    // 茎
    ctx.strokeStyle = '#228B22'; ctx.lineWidth = 3
    ctx.beginPath(); ctx.moveTo(cx, cy + w*0.1); ctx.lineTo(cx, h*0.8); ctx.stroke()
    // 叶子
    ctx.fillStyle = '#228B22'
    ctx.beginPath(); ctx.ellipse(cx + w*0.08, h*0.65, w*0.06, w*0.03, 0.5, 0, Math.PI*2); ctx.fill()
  },

  book(ctx, w, h) {
    // 封面
    ctx.fillStyle = '#8B0000'; ctx.fillRect(w*0.2, h*0.15, w*0.6, h*0.7)
    ctx.strokeStyle = '#5C0000'; ctx.lineWidth = 2; ctx.strokeRect(w*0.2, h*0.15, w*0.6, h*0.7)
    // 书脊
    ctx.fillStyle = '#660000'; ctx.fillRect(w*0.2, h*0.15, w*0.06, h*0.7)
    // 标题
    ctx.fillStyle = '#FFD700'; ctx.font = `bold ${w*0.08}px serif`; ctx.textAlign = 'center'
    ctx.fillText('BOOK', w*0.55, h*0.45)
    // 页面线
    ctx.strokeStyle = '#FFF8DC'; ctx.lineWidth = 0.5
    for (let i = 0; i < 4; i++) {
      ctx.beginPath(); ctx.moveTo(w*0.35, h*0.52 + i*h*0.06); ctx.lineTo(w*0.72, h*0.52 + i*h*0.06); ctx.stroke()
    }
  },

  cloud(ctx, w, h) {
    ctx.fillStyle = '#E8E8E8'
    ctx.beginPath(); ctx.arc(w*0.35, h*0.4, w*0.15, 0, Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(w*0.5, h*0.3, w*0.18, 0, Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(w*0.65, h*0.4, w*0.15, 0, Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(w*0.5, h*0.45, w*0.2, 0, Math.PI*2); ctx.fill()
    // 背景蓝天
    ctx.fillStyle = '#87CEEB'; ctx.globalCompositeOperation = 'destination-over'
    ctx.fillRect(0, 0, w, h)
    ctx.globalCompositeOperation = 'source-over'
  }
}

// 干扰图案列表（不含正确答案的图案）
const DISTRACTORS = ['cat', 'house', 'tree', 'car', 'flower', 'book', 'cloud']

// 生成 Canvas 图片 DataURL
function generateCaptchaImage(drawFn, size = 200) {
  const canvas = document.createElement('canvas')
  canvas.width = size; canvas.height = size
  const ctx = canvas.getContext('2d')
  // 浅色背景
  ctx.fillStyle = '#FAFAFA'; ctx.fillRect(0, 0, size, size)
  // 添加轻微噪点
  for (let i = 0; i < 200; i++) {
    ctx.fillStyle = `rgba(${Math.random()*200|0},${Math.random()*200|0},${Math.random()*200|0},0.08)`
    ctx.fillRect(Math.random()*size, Math.random()*size, Math.random()*4+1, Math.random()*4+1)
  }
  drawFn(ctx, size, size)
  return canvas.toDataURL('image/png')
}

// 3x3 验证码主题：key 对应 DRAW 中的绘制函数
const themes3x3 = [
  { prompt: '请选出包含【自行车】的图片', desc: '请选出2张包含自行车的图片', count: 2, target: 'bicycle' },
  { prompt: '请选出包含【红绿灯】的图片', desc: '请选出2张包含红绿灯的图片', count: 2, target: 'trafficLight' },
  { prompt: '请选出包含【桥梁】的图片', desc: '请选出2张包含桥梁的图片', count: 2, target: 'bridge' },
  { prompt: '请选出包含【山】的图片', desc: '请选出2张包含山的图片', count: 2, target: 'mountain' },
  { prompt: '请选出包含【河流】的图片', desc: '请选出2张包含河流的图片', count: 2, target: 'river' },
]

// 4x4 验证码主题
const themes4x4 = [
  { prompt: '请选出包含【红绿灯】的图片', desc: '请选出3张包含红绿灯的图片', count: 3, target: 'trafficLight' },
  { prompt: '请选出包含【大巴车】的图片', desc: '请选出3张包含大巴车的图片', count: 3, target: 'bus' },
  { prompt: '请选出包含【斑马线】的图片', desc: '请选出3张包含斑马线的图片', count: 3, target: 'zebraCrossing' },
]

function generateCaptchaSet(totalCount, targetCount, targetDrawKey) {
  // 随机选择正确位置
  correctIndices = []
  while (correctIndices.length < targetCount) {
    const idx = Math.floor(Math.random() * totalCount)
    if (!correctIndices.includes(idx)) correctIndices.push(idx)
  }
  // 为干扰图片选择不同的图案
  const availDistractors = DISTRACTORS.filter(d => d !== targetDrawKey)
  const images = []
  for (let i = 0; i < totalCount; i++) {
    if (correctIndices.includes(i)) {
      images.push(generateCaptchaImage(DRAW[targetDrawKey]))
    } else {
      const dKey = availDistractors[Math.floor(Math.random() * availDistractors.length)]
      images.push(generateCaptchaImage(DRAW[dKey]))
    }
  }
  return images
}

function showCaptcha() {
  selectedIndices = []
  correctIndices = []

  if (currentScenario === 'xhs-3x3') {
    show3x3Captcha()
  } else {
    show4x4Captcha()
  }

  document.getElementById('captchaOverlay').classList.add('show')
  log('info', '验证码已弹出，场景: ' + currentScenario)
}

function show3x3Captcha() {
  document.getElementById('captcha4x4').style.display = 'none'
  const div = document.getElementById('captcha-div')
  div.style.display = ''

  const theme = themes3x3[Math.floor(Math.random() * themes3x3.length)]
  document.getElementById('captchaPrompt3x3').textContent = theme.prompt
  document.getElementById('captchaDesc3x3').textContent = theme.desc

  const images = generateCaptchaSet(9, theme.count, theme.target)

  const grid = document.getElementById('captchaGrid3x3')
  grid.innerHTML = images.map((src, i) => `
    <div class="img-container" data-index="${i}" onclick="toggleSelect(this, ${i})">
      <img src="${src}" alt="图片${i+1}">
    </div>
  `).join('')

  const btn = document.getElementById('verifyBtn3x3')
  btn.className = 'btn btn-primary'
  btn.textContent = '验证'
  btn.onclick = () => verify3x3()

  log('info', `3x3验证码: 主题="${theme.prompt}", 正确答案位置=[${correctIndices.map(i => i+1).join(',')}]`)
}

function show4x4Captcha() {
  document.getElementById('captcha-div').style.display = 'none'
  const div = document.getElementById('captcha4x4')
  div.style.display = ''

  const theme = themes4x4[Math.floor(Math.random() * themes4x4.length)]
  document.getElementById('captchaPrompt4x4').textContent = theme.prompt
  document.getElementById('captchaDesc4x4').textContent = theme.desc

  const images = generateCaptchaSet(16, theme.count, theme.target)

  const grid = document.getElementById('captchaGrid4x4')
  grid.innerHTML = images.map((src, i) => `
    <div class="img-container" data-index="${i}" onclick="toggleSelect(this, ${i})">
      <img src="${src}" alt="图片${i+1}">
    </div>
  `).join('')

  const btn = document.getElementById('verifyBtn4x4')
  btn.className = 'btn'
  btn.textContent = '验证'
  btn.onclick = () => verify4x4()

  log('info', `4x4验证码: 主题="${theme.prompt}", 正确答案位置=[${correctIndices.map(i => i+1).join(',')}]`)
}

function toggleSelect(el, index) {
  if (el.classList.contains('selected')) {
    el.classList.remove('selected')
    selectedIndices = selectedIndices.filter(i => i !== index)
  } else {
    el.classList.add('selected')
    selectedIndices.push(index)
  }
  log('info', `当前选中: [${selectedIndices.map(i => i+1).join(',')}]`)
}

function verify3x3() {
  const sorted = [...selectedIndices].sort((a, b) => a - b)
  const sortedCorrect = [...correctIndices].sort((a, b) => a - b)
  const isCorrect = sorted.length === sortedCorrect.length && sorted.every((v, i) => v === sortedCorrect[i])

  if (isCorrect) {
    log('success', '验证通过！选中正确')
    showSuccess()
  } else {
    log('error', `验证失败！选中=[${sorted.map(i => i+1).join(',')}], 正确=[${sortedCorrect.map(i => i+1).join(',')}]`)
    const btn = document.getElementById('verifyBtn3x3')
    btn.textContent = '验证失败，重试'
    selectedIndices = []
    document.querySelectorAll('#captcha-div .img-container').forEach(el => el.classList.remove('selected'))
  }
}

function verify4x4() {
  const sorted = [...selectedIndices].sort((a, b) => a - b)
  const sortedCorrect = [...correctIndices].sort((a, b) => a - b)
  const isCorrect = sorted.length === sortedCorrect.length && sorted.every((v, i) => v === sortedCorrect[i])

  if (isCorrect) {
    log('success', '验证通过！选中正确')
    showSuccess()
  } else {
    log('error', `验证失败！选中=[${sorted.map(i => i+1).join(',')}], 正确=[${sortedCorrect.map(i => i+1).join(',')}]`)
    const btn = document.getElementById('verifyBtn4x4')
    btn.textContent = '验证失败，重试'
    selectedIndices = []
    document.querySelectorAll('.fe-captcha-app .img-container').forEach(el => el.classList.remove('selected'))
  }
}

function showSuccess() {
  document.getElementById('captchaOverlay').classList.remove('show')
  const banner = document.getElementById('successBanner')
  banner.classList.add('show')
  setTimeout(() => { banner.classList.remove('show') }, 3000)
}

// 点击遮罩层不关闭（与真实验证码一致）
document.getElementById('captchaOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    log('info', '点击遮罩层（不关闭，模拟真实行为）')
  }
})
