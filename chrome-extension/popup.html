<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#667eea;--primary-dark:#5a6fd6;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--bg:#f5f5f5;--bg-card:#fff;--text:#1f2937;--text2:#6b7280;--border:#e5e7eb;--radius:6px}
body{width:360px;min-height:400px;max-height:520px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:15px;font-weight:700}
.header-actions{display:flex;gap:6px}
.header-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600}
.header-btn:hover{background:rgba(255,255,255,0.3)}
.tabs{display:flex;background:var(--bg-card);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab:hover{color:var(--text)}
.content{padding:12px;overflow-y:auto;max-height:400px}
.script-list{display:flex;flex-direction:column;gap:8px}
.script-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;transition:box-shadow .15s}
.script-item:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.script-item.disabled{opacity:0.55}
.script-name{font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:space-between}
.script-desc{font-size:11px;color:var(--text2);margin-top:3px}
.script-meta{font-size:10px;color:var(--text2);margin-top:6px;display:flex;gap:10px}
.toggle{position:relative;width:36px;height:20px;background:#ccc;border-radius:10px;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--success)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}
.empty{text-align:center;padding:32px 16px;color:var(--text2);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px}
.config-group{margin-bottom:14px}
.config-group label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--text)}
.config-group input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none}
.config-group input:focus{border-color:var(--primary)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:8px 16px;border:none;border-radius:var(--radius);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-block{width:100%}
.status-bar{padding:8px 16px;font-size:11px;color:var(--text2);background:var(--bg-card);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.status-bar.error{color:var(--danger)}
.sync-spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.page{display:none}
.page.active{display:block}
.script-actions{display:flex;gap:6px;margin-top:8px}
.script-actions .btn{padding:4px 8px;font-size:10px}
</style>
</head>
<body>

<div class="header">
  <h1>AI Browser 脚本中心</h1>
  <div class="header-actions">
    <button class="header-btn" id="syncBtn" title="同步脚本">同步</button>
    <button class="header-btn" id="injectBtn" title="立即注入到当前页面">注入</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-page="scripts" id="tabScripts">脚本列表</div>
  <div class="tab" data-page="settings" id="tabSettings">设置</div>
</div>

<!-- 脚本列表 -->
<div id="page-scripts" class="page active">
  <div class="content" id="scriptList">
    <div class="empty"><div class="empty-icon">📜</div>加载中...</div>
  </div>
</div>

<!-- 设置 -->
<div id="page-settings" class="page">
  <div class="content">
    <div class="config-group">
      <label>管理后台地址</label>
      <input type="text" id="serverUrl" placeholder="http://localhost:3001">
    </div>
    <div class="config-group">
      <label>API Token</label>
      <input type="password" id="token" placeholder="从管理后台获取 Token">
    </div>
    <div class="config-group">
      <label>同步间隔（分钟）</label>
      <input type="number" id="syncInterval" value="30" min="5" max="1440">
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <label style="font-size:12px;font-weight:600">启用自动注入</label>
      <div class="toggle on" id="globalToggle"></div>
    </div>
    <button class="btn btn-primary btn-block" id="saveConfigBtn">保存设置并同步</button>
    <div style="margin-top:12px;font-size:11px;color:var(--text2);line-height:1.6">
      <b>获取 Token 方式：</b><br>
      1. 访问管理后台<br>
      2. 使用 admin/admin123 登录<br>
      3. 在「API Token」页面复制 Token
    </div>
  </div>
</div>

<div class="status-bar" id="statusBar">就绪</div>

<script src="popup.js"></script>
</body>
</html>
