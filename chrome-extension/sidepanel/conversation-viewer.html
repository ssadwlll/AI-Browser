<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>对话全景 - AI Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a14;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 头部 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #111122;
      border-bottom: 2px solid #6841ea;
      flex-shrink: 0;
    }
    .header-title { font-size: 16px; font-weight: 700; color: #6841ea; }
    .header-actions { display: flex; gap: 8px; }
    .header-btn {
      padding: 6px 14px;
      border: 1px solid #40a0f0;
      border-radius: 6px;
      background: #1a1a2e;
      color: #60b0f0;
      font-size: 13px;
      cursor: pointer;
    }
    .header-btn:hover { background: #2a2a3e; }
    .header-btn.danger { border-color: #f04040; color: #f05050; }

    /* 主体区域 */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .empty-state {
      text-align: center;
      color: #8c8c8c;
      padding: 80px 40px;
      font-size: 14px;
    }

    /* 轮次列表项（紧凑卡片） */
    .round-item {
      background: #111118;
      border-radius: 8px;
      border: 1px solid rgba(104,65,234,0.15);
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .round-item:hover { background: rgba(104,65,234,0.1); border-color: rgba(104,65,234,0.3); }
    .round-item.done { border-left: 3px solid #00aa5b; }
    .round-item-title {
      font-size: 13px;
      font-weight: 600;
      color: #6841ea;
    }
    .round-item-title.done { color: #00aa5b; }
    .round-item-meta {
      font-size: 12px;
      color: #8c8c8c;
    }

    /* 详情弹窗 */
    .detail-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .detail-modal.show { display: flex; }
    .detail-modal-content {
      background: #111118;
      border-radius: 12px;
      width: 90%;
      max-width: 1000px;
      height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .detail-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: rgba(104,65,234,0.1);
      border-bottom: 1px solid rgba(104,65,234,0.2);
    }
    .detail-modal-title { font-size: 15px; font-weight: 600; color: #6841ea; }
    .detail-modal-close {
      font-size: 20px;
      color: #8c8c8c;
      cursor: pointer;
      padding: 4px 10px;
    }
    .detail-modal-close:hover { color: #ea3639; }
    .detail-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 详情区块 */
    .detail-section {
      background: #0a0a12;
      border-radius: 8px;
      padding: 12px;
      border: 1px solid rgba(64,160,240,0.15);
    }
    .detail-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .detail-section-title {
      font-size: 13px;
      font-weight: 600;
      color: #40a0f0;
    }
    .detail-section-copy {
      font-size: 11px;
      padding: 4px 10px;
      border: 1px solid rgba(104,65,234,0.3);
      border-radius: 4px;
      background: rgba(104,65,234,0.1);
      color: #6841ea;
      cursor: pointer;
    }
    .detail-section-copy:hover { background: rgba(104,65,234,0.2); }

    /* JSON树形展示 */
    .json-tree {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    .json-node { margin: 2px 0; }
    .json-node.collapsed > .json-children { display: none; }
    .json-key {
      color: #9cdcfe;
      cursor: pointer;
      display: inline;
    }
    .json-key:hover { background: rgba(156,220,254,0.15); }
    .json-toggle {
      color: #8c8c8c;
      font-size: 10px;
      margin-right: 2px;
      width: 10px;
      display: inline-block;
    }
    .json-toggle.expanded::before { content: '▼'; }
    .json-toggle.collapsed::before { content: '▶'; }
    .json-colon { color: #8c8c8c; margin: 0 2px; }
    .json-bracket { color: #ffd700; }
    .json-value { color: #ce9178; }
    .json-value.number { color: #b5cea8; }
    .json-value.boolean { color: #569cd6; }
    .json-value.null { color: #569cd6; font-style: italic; }
    .json-count { color: #8c8c8c; font-size: 11px; margin-left: 4px; }
    .json-children { margin-left: 16px; }

    /* 数据项卡片 */
    .data-item {
      background: rgba(104,65,234,0.08);
      border-radius: 6px;
      padding: 8px 12px;
      border: 1px solid rgba(104,65,234,0.2);
      cursor: pointer;
      margin: 6px 0;
    }
    .data-item:hover { background: rgba(104,65,234,0.15); }
    .data-item-id { font-size: 12px; font-weight: 600; color: #6841ea; font-family: monospace; }
    .data-item-meta { font-size: 11px; color: #8c8c8c; margin-top: 2px; }

    /* 数据详情弹窗 */
    .data-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1100;
      justify-content: center;
      align-items: center;
    }
    .data-modal.show { display: flex; }
    .data-modal-content {
      background: #111118;
      border-radius: 12px;
      width: 85%;
      max-width: 900px;
      height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .data-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: rgba(104,65,234,0.1);
      border-bottom: 1px solid rgba(104,65,234,0.2);
    }
    .data-modal-title { font-size: 14px; font-weight: 600; color: #6841ea; }
    .data-modal-actions { display: flex; gap: 8px; }
    .data-modal-btn {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
    }
    .data-modal-btn.copy {
      background: rgba(104,65,234,0.1);
      border: 1px solid rgba(104,65,234,0.3);
      color: #6841ea;
    }
    .data-modal-btn.close {
      background: transparent;
      color: #8c8c8c;
      font-size: 16px;
    }
    .data-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 12px;
      right: 12px;
      background: #40a0f0;
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">🔭 对话全景</div>
    <div class="header-actions">
      <button class="header-btn" id="copyAllBtn">📋 复制全部</button>
      <button class="header-btn danger" id="clearBtn">✕ 清空</button>
    </div>
  </div>

  <div class="main" id="main">
    <div class="empty-state">等待 Agent 任务启动…<br>点击轮次查看详情</div>
  </div>

  <!-- 轮次详情弹窗 -->
  <div class="detail-modal" id="detailModal">
    <div class="detail-modal-content">
      <div class="detail-modal-header">
        <div class="detail-modal-title" id="detailTitle">轮次详情</div>
        <div class="detail-modal-close" id="detailClose">✕</div>
      </div>
      <div class="detail-modal-body" id="detailBody"></div>
    </div>
  </div>

  <!-- 数据详情弹窗 -->
  <div class="data-modal" id="dataModal">
    <div class="data-modal-content">
      <div class="data-modal-header">
        <div class="data-modal-title" id="dataTitle">数据详情</div>
        <div class="data-modal-actions">
          <button class="data-modal-btn copy" id="dataCopyBtn">📋 复制</button>
          <div class="data-modal-btn close" id="dataClose">✕</div>
        </div>
      </div>
      <div class="data-modal-body" id="dataBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="conversation-viewer.js"></script>
</body>
</html>
