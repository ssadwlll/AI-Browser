<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Browser</title>
<link rel="stylesheet" href="sidepanel.css">
</head>
<body>
<div id="app">
  <div class="main-layout">
    <!-- 内容区 -->
    <div class="content-area">

      <!-- 聊天视图 -->
      <div id="chatView" class="view active">
        <div class="chat-messages" id="chatMessages">
          <div class="welcome">
            <div class="welcome-logo">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="url(#grad1)" stroke-width="1.5"><defs><linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#b059f8"/><stop offset="100%" style="stop-color:#6841ea"/></linearGradient></defs><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <div class="welcome-title">欢迎使用 AI Browser</div>
            <div class="welcome-desc">智能分析网页、高效对话、一键工具</div>
            <div class="quick-actions">
              <button class="quick-btn" data-prompt="总结当前页面内容">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span>总结页面</span>
              </button>
              <button class="quick-btn" data-prompt="翻译当前页面为中文">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
                <span>翻译页面</span>
              </button>
              <button class="quick-btn" data-prompt="提取当前页面的关键信息">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
                <span>提取信息</span>
              </button>
              <button class="quick-btn" data-prompt="分析当前页面的代码结构">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                <span>代码分析</span>
              </button>
            </div>
          </div>
        </div>

        <!-- 输入区域 -->
        <div class="chat-input-area">
          <div class="attachment-preview" id="attachmentPreview"></div>
          <div class="input-box">
            <textarea id="chatInput" placeholder="问我任何问题..." rows="1"></textarea>
            <div class="sender-bar">
              <button class="icon-btn new-chat-btn" id="newChatBtn" title="新建对话">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
              </button>
              <button class="model-pill-btn" id="modelPillBtn" title="切换模型">
                <span class="model-pill-name" id="modelPillName">模型</span>
                <svg class="model-pill-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="input-toolbar">
                <button class="toolbar-btn" id="summarizeFloatBtn" title="总结页面">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                </button>
                <button class="toolbar-btn" id="toolboxFloatBtn" title="智能工具箱">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
                </button>
                <button class="toolbar-btn" id="uploadBtn" title="上传图片/PDF">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                </button>
              </div>
              <button class="send-btn" id="sendBtn" title="发送">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- 智能工具箱弹出面板 -->
        <div class="toolbox-panel" id="toolboxPanel">
          <div class="toolbox-header">
            <span>智能工具箱</span>
            <button class="toolbox-close" id="toolboxCloseBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>
          <div class="toolbox-content" id="toolboxScripts"></div>
        </div>

        <!-- 模型选择弹出面板 -->
        <div class="model-dropdown-panel" id="modelDropdownPanel">
          <div class="model-dropdown-header">
            <span>选择模型</span>
            <button class="model-dropdown-close" id="modelDropdownCloseBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>
          <div class="model-dropdown-content" id="modelDropdownContent"></div>
        </div>

        <!-- JS注入面板 -->
        <div class="js-injector-panel" id="jsInjectorPanel">
          <div class="js-injector-header">
            <span>JS 代码注入 <span class="hint">— 注入到当前页面执行</span></span>
            <button class="js-injector-close" id="jsInjectorCloseBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>
          <div class="js-injector-body">
            <textarea id="jsCodeInput" placeholder="输入要注入的 JavaScript 代码...&#10;&#10;例如：&#10;document.title = 'Hello World';&#10;alert('注入成功！');" spellcheck="false"></textarea>
            <div class="js-injector-actions">
              <button class="btn btn-primary btn-run" id="jsInjectRunBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                注入执行
              </button>
            </div>
            <div class="js-injector-result" id="jsInjectorResult"></div>
          </div>
        </div>
      </div>

      <!-- 设置视图 -->
      <div id="settingsView" class="view">
        <div class="sub-header">
          <button class="icon-btn" id="backToChatBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
          <span>设置</span>
        </div>
        <div class="settings-content">
          <div class="settings-section">
            <h3>服务端连接</h3>
            <div class="form-group">
              <label>管理后台地址</label>
              <input type="text" id="syncServerUrl" placeholder="http://localhost:3001">
            </div>
            <div class="form-group">
              <label>AppKey</label>
              <input type="text" id="syncAppKey" placeholder="输入AppKey">
            </div>
            <div class="form-group">
              <label>AppSecret</label>
              <input type="password" id="syncAppSecret" placeholder="输入AppSecret">
            </div>
            <button class="btn btn-secondary btn-sm" id="testConnectionBtn">测试连接</button>
            <span id="connectionStatus" class="hint"></span>
          </div>
          <div class="settings-section">
            <h3>AI 模型配置</h3>
            <div class="form-group">
              <label>系统提示词</label>
              <textarea id="aiSystemPrompt" rows="3" placeholder="你是 AI Browser 助手..."></textarea>
            </div>
            <div class="form-group">
              <label>Temperature <span class="hint" id="tempValue">0.7</span></label>
              <input type="range" id="aiTemperature" min="0" max="2" step="0.1" value="0.7">
            </div>
            <div class="form-group">
              <label>上下文窗口大小 (max_tokens)</label>
              <input type="number" id="aiMaxTokens" value="4096" min="512" max="131072" step="512">
            </div>
          </div>
          <div class="settings-section">
            <h3>功能开关</h3>
            <div class="toggle-row">
              <span>划词工具栏</span>
              <div class="toggle on" id="selectionToolsToggle"></div>
            </div>
          </div>
          <div class="settings-section">
            <h3>Agent 模式</h3>
            <div class="form-group">
              <label>最大执行轮次 <span class="hint" id="agentRoundsValue">8</span></label>
              <input type="range" id="agentMaxRounds" min="5" max="100" step="5" value="8">
            </div>
            <div class="toggle-row">
              <span>调试模式 <span class="hint">显示每步的提示词、工具调用、规则触发</span></span>
              <div class="toggle" id="agentDebugToggle"></div>
            </div>
          </div>
          <button class="btn btn-primary btn-block" id="saveSettingsBtn">保存设置</button>
        </div>
      </div>

      <!-- 脚本面板 -->
      <div id="scriptsView" class="view">
        <div class="sub-header">
          <button class="icon-btn" id="backFromScriptsBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
          <span>脚本管理</span>
          <button class="icon-btn" id="syncScriptsBtn" title="同步">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          </button>
        </div>
        <div class="scripts-list" id="scriptsList"></div>
      </div>

      <!-- 画图视图（预留） -->
      <div id="drawView" class="view">
        <div class="sub-header">
          <button class="icon-btn" id="backFromDrawBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
          <span>AI 画图</span>
        </div>
        <div class="placeholder-view">
          <div class="placeholder-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>
          <div class="placeholder-text">即将上线</div>
          <div class="placeholder-desc">AI 文生图功能开发中</div>
        </div>
      </div>

      <!-- 视频视图（预留） -->
      <div id="videoView" class="view">
        <div class="sub-header">
          <button class="icon-btn" id="backFromVideoBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
          <span>AI 视频</span>
        </div>
        <div class="placeholder-view">
          <div class="placeholder-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
          </div>
          <div class="placeholder-text">即将上线</div>
          <div class="placeholder-desc">AI 文生视频功能开发中</div>
        </div>
      </div>
    </div>

    <!-- 右侧导航栏 -->
    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="chatView" title="聊天">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      </button>

      <div class="nav-divider"></div>
      <button class="nav-item" data-view="scriptsView" title="脚本">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </button>
      <div class="nav-divider"></div>
      <button class="nav-item" id="agentNavBtn" title="Agent自主决策">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2a3 3 0 00-3 3v1a3 3 0 003 3 3 3 0 003-3V5a3 3 0 00-3-3z"/><path d="M12 9v3"/><path d="M7 14a5 5 0 0010 0"/><path d="M12 19v3"/><circle cx="9" cy="14.5" r="1"/><circle cx="15" cy="14.5" r="1"/></svg>
      </button>
      <button class="nav-item" data-view="drawView" title="AI画图">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <button class="nav-item" data-view="videoView" title="AI视频">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      </button>
      <button class="nav-item" data-view="settingsView" title="设置">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
    </nav>
  </div>
</div>

<script type="module" src="sidepanel.js"></script>
</body>
</html>
