<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Browser - Debug Log</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Consolas, 'Courier New', monospace;
  background: #0a0a14;
  color: #ccc;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: #111122;
  border-bottom: 2px solid #ff6b35;
  flex-shrink: 0;
}
.header h1 {
  font-size: 14px;
  color: #ff6b35;
  font-weight: 700;
}
.header-actions {
  display: flex;
  gap: 6px;
}
.btn {
  padding: 4px 12px;
  border: 1px solid #444;
  border-radius: 4px;
  background: #1a1a2e;
  color: #ccc;
  font-size: 12px;
  cursor: pointer;
  font-family: Consolas, monospace;
}
.btn:hover { background: #2a2a3e; color: #fff; }
.btn.copy { border-color: #40a0f0; color: #60b0f0; }
.btn.copy:hover { background: #102040; }
.btn.clear { border-color: #f04040; color: #f05050; }
.btn.clear:hover { background: #201010; }
.body {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
}
.log-entry {
  padding: 8px 12px;
  margin: 4px 0;
  border-radius: 4px;
  background: #0f0f20;
  border-left: 3px solid #555;
  white-space: pre-wrap;
  word-break: break-all;
  font-size: 12px;
  line-height: 1.6;
}
.log-entry.warn { border-left-color: #f0a020; background: #1a1a18; }
.log-entry.error { border-left-color: #f04040; background: #1a1015; }
.log-entry.info { border-left-color: #40a0f0; background: #101a20; }
.log-label {
  font-weight: 700;
  font-size: 12px;
  margin-bottom: 4px;
}
.log-label.info { color: #60b0f0; }
.log-label.warn { color: #f0b030; }
.log-label.error { color: #f05050; }
.log-label.default { color: #aaa; }
.log-detail {
  color: #999;
  font-size: 11px;
}
.empty-state {
  text-align: center;
  color: #555;
  padding: 60px 20px;
  font-size: 13px;
}
.toast {
  position: fixed;
  top: 12px;
  right: 12px;
  background: #40a0f0;
  color: #fff;
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 12px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>🐛 AI Browser Debug Log</h1>
  <div class="header-actions">
    <button class="btn copy" id="copyBtn" title="复制全部日志">📋 复制全部</button>
    <button class="btn clear" id="clearBtn" title="清空日志">✕ 清空</button>
  </div>
</div>

<div class="body" id="logBody">
  <div class="empty-state">等待 Agent 任务启动…<br>日志将自动显示在这里</div>
</div>

<div class="toast" id="toast"></div>

<script src="debug-log-viewer.js"></script>
</body>
</html>
