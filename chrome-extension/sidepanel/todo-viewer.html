<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Browser - Todo Tracker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Consolas, 'Courier New', monospace;
  background: #0a0a14;
  color: #ccc;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: #111122;
  border-bottom: 2px solid #22c55e;
  flex-shrink: 0;
}
.header h1 {
  font-size: 14px;
  color: #22c55e;
  font-weight: 700;
}
.header-actions {
  display: flex;
  gap: 6px;
}
.btn {
  padding: 4px 12px;
  border: 1px solid #444;
  border-radius: 4px;
  background: #1a1a2e;
  color: #ccc;
  font-size: 12px;
  cursor: pointer;
  font-family: Consolas, monospace;
}
.btn:hover { background: #2a2a3e; color: #fff; }
.btn.copy { border-color: #40a0f0; color: #60b0f0; }
.btn.copy:hover { background: #102040; }
.btn.clear { border-color: #f04040; color: #f05050; }
.btn.clear:hover { background: #201010; }

/* Overview bar */
.overview {
  display: flex;
  gap: 12px;
  padding: 10px 14px;
  background: #0f0f1e;
  border-bottom: 1px solid #1a1a2e;
  flex-shrink: 0;
  flex-wrap: wrap;
  align-items: center;
}
.overview-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: #888;
}
.overview-item .val {
  font-weight: 700;
  font-size: 13px;
}
.overview-item .val.stage1 { color: #60b0f0; }
.overview-item .val.stage2 { color: #f0a030; }
.overview-item .val.stage3 { color: #22c55e; }
.progress-bar {
  width: 120px;
  height: 8px;
  background: #1a1a2e;
  border-radius: 4px;
  overflow: hidden;
  display: inline-block;
  vertical-align: middle;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  border-radius: 4px;
  transition: width 0.4s ease;
  width: 0%;
}
.last-tool {
  font-size: 11px;
  color: #555;
  margin-left: auto;
  font-style: italic;
}

/* Main body */
.body {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
}
.stage-group {
  margin-bottom: 16px;
}
.stage-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  background: #111122;
  border-radius: 6px 6px 0 0;
  border-left: 4px solid #555;
  font-size: 12px;
  font-weight: 700;
  color: #888;
}
.stage-header.active {
  border-left-color: #22c55e;
  color: #22c55e;
  background: #0f1a10;
}
.stage-header.done {
  border-left-color: #60b0f0;
  color: #60b0f0;
}
.stage-header .badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  background: #1a1a2e;
  color: #888;
  margin-left: auto;
}
.stage-header.active .badge { background: #0a2a10; color: #22c55e; }
.stage-header.done .badge { background: #0a1a2a; color: #60b0f0; }

/* Todo items */
.todo-list {
  list-style: none;
}
.todo-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 10px;
  border-bottom: 1px solid #0f0f1e;
  background: #0a0a14;
  font-size: 12px;
  line-height: 1.5;
  transition: background 0.2s;
}
.todo-item:last-child { border-bottom: none; }
.todo-item.running {
  background: #0f1a20;
  border-left: 3px solid #40a0f0;
}
.todo-item.done {
  background: #0a1410;
  border-left: 3px solid #22c55e;
}
.todo-item.failed {
  background: #1a0a0f;
  border-left: 3px solid #f04040;
}
.todo-item.pending {
  border-left: 3px solid transparent;
}
.todo-icon {
  flex-shrink: 0;
  width: 16px;
  text-align: center;
  font-size: 13px;
  line-height: 1.5;
}
.todo-content {
  flex: 1;
  min-width: 0;
}
.todo-id {
  font-size: 10px;
  color: #555;
  font-family: Consolas, monospace;
  margin-right: 6px;
}
.todo-action {
  font-size: 11px;
  color: #40a0f0;
  font-family: Consolas, monospace;
  background: #0a1a2a;
  padding: 0 4px;
  border-radius: 3px;
  margin-right: 4px;
}
.todo-desc {
  color: #bbb;
  font-size: 12px;
}
.todo-keys {
  margin-top: 3px;
  font-size: 10px;
  color: #555;
}
.todo-keys .key {
  display: inline-block;
  background: #1a1a2e;
  padding: 0 4px;
  border-radius: 3px;
  margin-right: 3px;
  color: #888;
}
.stage-switch-log {
  padding: 6px 10px;
  background: #1a1a18;
  border-left: 3px solid #f0a020;
  border-radius: 4px;
  margin: 6px 0;
  font-size: 11px;
  color: #f0b030;
}
.empty-state {
  text-align: center;
  color: #555;
  padding: 60px 20px;
  font-size: 13px;
}
.toast {
  position: fixed;
  top: 12px;
  right: 12px;
  background: #22c55e;
  color: #fff;
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 12px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>📋 Todo Tracker</h1>
  <div class="header-actions">
    <button class="btn copy" id="copyBtn" title="复制全部待办">📋 复制</button>
    <button class="btn clear" id="clearBtn" title="清空">✕ 清空</button>
  </div>
</div>

<div class="overview" id="overview" style="display:none">
  <div class="overview-item">阶段: <span class="val" id="ovStage">-</span></div>
  <div class="overview-item">进度:
    <div class="progress-bar"><div class="progress-fill" id="ovProgressFill"></div></div>
    <span class="val" id="ovProgress">0%</span>
  </div>
  <div class="overview-item">已完成: <span class="val" id="ovDone">0</span>/<span id="ovTotal">0</span></div>
  <div class="last-tool" id="ovLastTool"></div>
</div>

<div class="body" id="todoBody">
  <div class="empty-state">等待 Agent 任务启动…<br>待办列表将自动显示在这里</div>
</div>

<div class="toast" id="toast"></div>

<script src="todo-viewer.js"></script>
</body>
</html>
